name: Full Stack CI/CD

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    strategy:
      matrix:
        php-version: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_sqlite, pdo_mysql, curl, dom, json, zip, gd
          coverage: xdebug
          tools: composer:latest

      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Tests
        run: ./vendor/bin/phpunit --coverage-text

  frontend-build:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      - name: Type Check
        run: npm run typecheck
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ matrix.node-version }}
          path: frontend/dist/
          retention-days: 5

  frontend-quality:
    name: Frontend - Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      - name: Lint Check
        run: npm run lint:check
        working-directory: ./frontend

      - name: Format Check
        run: npm run format:check
        working-directory: ./frontend

  summary:
    name: Pipeline Summary
    needs: [backend-build, frontend-build, frontend-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Job Status
        run: |
          if [ "${{ needs.backend-build.result }}" = "failure" ] || [ "${{ needs.frontend-build.result }}" = "failure" ] || [ "${{ needs.frontend-quality.result }}" = "failure" ]; then
            echo "❌ Pipeline Failed"
            exit 1
          fi
          echo "✅ Full Stack CI/CD Pipeline Passed Successfully!"
          echo ""
          echo "📊 Results:"
          echo "✓ Backend: PHP 8.2 & 8.3 tests passed"
          echo "✓ Frontend: Build passed (Node 20.x & 22.x)"
          echo "✓ Frontend: Linting & formatting passed"
